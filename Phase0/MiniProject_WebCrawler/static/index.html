<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiaki Search Engine — Mini Project Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #222632;
            --border: #2a2e3b;
            --text: #e4e4e7;
            --text-dim: #9ca3af;
            --accent: #6366f1;
            --accent-soft: rgba(99, 102, 241, 0.12);
            --green: #22c55e;
            --yellow: #eab308;
            --radius: 10px;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .header {
            text-align: center;
            padding: 48px 24px 32px;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header h1 span {
            color: var(--accent);
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 32px;
            padding: 12px 24px;
            margin-bottom: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .search-wrap {
            max-width: 560px;
            margin: 0 auto 40px;
            padding: 0 24px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 48px 14px 18px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .search-btn {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
        }

        .search-btn:hover {
            color: var(--accent);
        }

        .results-info {
            max-width: 720px;
            margin: 0 auto 16px;
            padding: 0 24px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .results {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px 60px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .card:hover {
            background: var(--surface-hover);
            border-color: var(--accent);
        }

        .card-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-meta {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .card-meta .badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--text-dim);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Modal overlay ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 100;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            max-width: 680px;
            width: 100%;
            padding: 28px 28px 24px;
            position: relative;
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.4rem;
            cursor: pointer;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal h2 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            padding-right: 32px;
        }

        .modal-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 20px 0 8px;
        }

        .modal-desc {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.65;
        }

        .modal-link {
            font-size: 0.78rem;
            color: var(--accent);
            text-decoration: none;
            word-break: break-all;
        }

        .modal-link:hover {
            text-decoration: underline;
        }

        /* ── Comments ── */
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .comment {
            background: var(--bg);
            border-radius: 8px;
            padding: 12px 14px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .comment-user {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .comment-rating {
            font-size: 0.75rem;
            color: var(--yellow);
        }

        .comment-text {
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .comment-date {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 4px;
            opacity: 0.6;
        }

        .no-comments {
            font-size: 0.82rem;
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── Empty / loading states ── */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-dim);
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1><span>Chiaki</span> Search Engine</h1>
        <p>Mini Project — Web Crawler &amp; Full-text Search Demo</p>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat">
            <div class="stat-value" id="statProducts">—</div>
            <div class="stat-label">Sản phẩm</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="statComments">—</div>
            <div class="stat-label">Bình luận</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="statCategories">—</div>
            <div class="stat-label">Danh mục</div>
        </div>
    </div>

    <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput"
            placeholder="Tìm sản phẩm… (ví dụ: vitamin, sữa bột, tã)" autocomplete="off">
        <button class="search-btn" id="searchBtn" title="Tìm kiếm">🔍</button>
    </div>

    <div class="results-info" id="resultsInfo"></div>
    <div class="results" id="results">
        <div class="empty-state">
            <div class="icon">🔎</div>
            <p>Nhập từ khóa để tìm kiếm sản phẩm</p>
        </div>
    </div>

    <!-- Product detail modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API = '';  // same origin
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');
        const resultsInfo = document.getElementById('resultsInfo');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');

        // ── Load stats ──
        fetch(`${API}/stats`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('statProducts').textContent = data.total_products ?? '—';
                document.getElementById('statComments').textContent = data.total_comments ?? '—';
                document.getElementById('statCategories').textContent = data.total_categories ?? '—';
            })
            .catch(() => { });

        // ── Search ──
        function doSearch() {
            const q = searchInput.value.trim();
            if (!q) return;

            resultsDiv.classList.add('loading');
            resultsInfo.textContent = 'Đang tìm…';

            fetch(`${API}/search?q=${encodeURIComponent(q)}&limit=30`)
                .then(r => r.json())
                .then(data => {
                    resultsDiv.classList.remove('loading');
                    const items = data.results || [];

                    if (items.length === 0) {
                        resultsInfo.textContent = `Không tìm thấy kết quả cho "${q}"`;
                        resultsDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😔</div>
                        <p>Thử từ khóa khác nhé</p>
                    </div>`;
                        return;
                    }

                    resultsInfo.textContent = `${items.length} kết quả cho "${q}" (BM25 ranking)`;
                    resultsDiv.innerHTML = items.map(p => `
                <div class="card" onclick="showProduct(${p.product_id})">
                    <div class="card-name">${esc(p.name)}</div>
                    <div class="card-meta">
                        <span class="badge">${esc(p.category)}</span>
                        <span>ID: ${p.product_id}</span>
                        ${p.score != null ? `<span>Score: ${p.score.toFixed(2)}</span>` : ''}
                    </div>
                    <div class="card-desc">${esc(p.description_short || '')}</div>
                </div>
            `).join('');
                })
                .catch(() => {
                    resultsDiv.classList.remove('loading');
                    resultsInfo.textContent = 'Lỗi kết nối API';
                });
        }

        searchBtn.addEventListener('click', doSearch);
        searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

        // ── Product detail modal ──
        function showProduct(id) {
            modalContent.innerHTML = '<p style="color:var(--text-dim)">Đang tải…</p>';
            modalOverlay.classList.add('active');

            fetch(`${API}/product/${id}`)
                .then(r => r.json())
                .then(p => {
                    const comments = p.comments || [];
                    modalContent.innerHTML = `
                <h2>${esc(p.name)}</h2>
                <div class="card-meta" style="margin-bottom:4px">
                    <span class="badge">${esc(p.category)}</span>
                    <span>ID: ${p.product_id}</span>
                </div>
                <a class="modal-link" href="${esc(p.url)}" target="_blank">${esc(p.url)}</a>

                ${p.description_short ? `
                    <div class="modal-section-title">Mô tả ngắn</div>
                    <div class="modal-desc">${esc(p.description_short)}</div>
                ` : ''}

                ${p.description_long ? `
                    <div class="modal-section-title">Mô tả chi tiết</div>
                    <div class="modal-desc">${esc(p.description_long).substring(0, 800)}${p.description_long.length > 800 ? '…' : ''}</div>
                ` : ''}

                <div class="modal-section-title">Bình luận (${comments.length})</div>
                ${comments.length > 0 ? `
                    <div class="comment-list">
                        ${comments.map(c => `
                            <div class="comment">
                                <div class="comment-header">
                                    <span class="comment-user">${esc(c.user || 'Ẩn danh')}</span>
                                    ${c.evaluation ? `<span class="comment-rating">${'★'.repeat(c.evaluation)}${'☆'.repeat(5 - c.evaluation)}</span>` : ''}
                                </div>
                                <div class="comment-text">${esc(c.content)}</div>
                                ${c.created_at ? `<div class="comment-date">${esc(c.created_at)}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                ` : '<p class="no-comments">Chưa có bình luận</p>'}
            `;
                })
                .catch(() => {
                    modalContent.innerHTML = '<p style="color:#ef4444">Không thể tải sản phẩm</p>';
                });
        }

        // Close modal
        document.getElementById('modalClose').addEventListener('click', () => modalOverlay.classList.remove('active'));
        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') modalOverlay.classList.remove('active'); });

        // ── Util ──
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }
    </script>

</body>

</html>
